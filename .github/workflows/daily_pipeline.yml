name: Khavda Daily Pipeline

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC (5:30 AM IST)
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    # Give the workflow write permission to push data back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so incremental weather data appends correctly
          fetch-depth: 0
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libpq-dev gcc

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright (for scrapers that need it)
        run: |
          playwright install chromium --with-deps

      - name: Run Master Data Pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python run_pipeline.py
        
      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ reports/
          git diff --staged --quiet || git commit -m "ci: automated pipeline run $(date -u '+%Y-%m-%d %H:%M UTC') — data & forecasts updated"
          git push
