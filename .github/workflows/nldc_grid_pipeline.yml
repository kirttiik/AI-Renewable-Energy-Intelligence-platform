name: NLDC Grid Intelligence Pipeline

on:
  schedule:
    # 06:00 AM IST = 00:30 AM UTC
    - cron: '30 0 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  scrape-grid-frequency:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libpq-dev gcc

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright (for NLDC scraper)
        run: |
          playwright install chromium --with-deps

      - name: Run NLDC Grid Frequency Scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python src/ingestion/nldc_grid_scraper.py
          
      - name: Commit Local CSV Fallbacks
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/grid/
          git diff --staged --quiet || git commit -m "ci: updated NLDC grid frequency data $(date -u '+%Y-%m-%d')"
          git push
